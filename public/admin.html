<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — LoL Draft</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a9cff; --blue-glow: rgba(26,156,255,.35);
      --red: #e84057;  --red-glow:  rgba(232,64,87,.35);
      --gold: #c89b3c; --gold-bright: #f0c060; --gold-glow: rgba(200,155,60,.4);
      --dark: #06090f; --panel: #0d1117; --panel2: #111827;
      --border: #1e2a3a; --border2: #253447; --text: #c8d6e5; --dimmed: #4a5568;
    }
    html, body { min-height: 100vh; background: var(--dark); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, #0d1421 0%, var(--panel) 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; flex-wrap: wrap;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1.1rem; color: var(--gold-bright); text-shadow: 0 0 16px var(--gold-glow); letter-spacing: .5px; }

    .step-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #step-info {
      font-size: .8rem; padding: 6px 14px;
      background: var(--panel2); border: 1px solid var(--border2); border-radius: 8px;
      min-width: 220px; text-align: center; font-weight: 700;
    }

    .btn { border: none; border-radius: 8px; padding: 7px 14px; font-size: .8rem; font-weight: 700; cursor: pointer; transition: opacity .15s, transform .1s; letter-spacing: .3px; }
    .btn:hover:not(:disabled) { opacity: .82; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-prev    { background: rgba(26,156,255,.12); color: var(--blue); border: 1px solid rgba(26,156,255,.28); }
    .btn-next    { background: rgba(232,64,87,.12);  color: var(--red);  border: 1px solid rgba(232,64,87,.28); }
    .btn-refresh { background: rgba(200,155,60,.1);  color: var(--gold-bright); border: 1px solid rgba(200,155,60,.25); }

    /* ── Teams grid ── */
    .teams-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 20px; padding: 22px 28px; max-width: 1200px; margin: 0 auto;
    }

    .team-col h2 {
      font-size: .95rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 14px; padding: 9px 14px; border-radius: 8px;
    }
    .team-col.blue h2 { color: var(--blue); background: rgba(26,156,255,.07); border: 1px solid rgba(26,156,255,.2); text-shadow: 0 0 12px var(--blue-glow); }
    .team-col.red  h2 { color: var(--red);  background: rgba(232,64,87,.07);  border: 1px solid rgba(232,64,87,.2);  text-shadow: 0 0 12px var(--red-glow); }

    .slots-section { margin-bottom: 18px; }
    .slots-section h3 { font-size: .62rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dimmed); margin-bottom: 8px; padding: 0 2px; }

    /* ── Slot card ── */
    .admin-slot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; margin-bottom: 6px;
      background: var(--panel); border: 1px solid var(--border2); border-radius: 8px;
      transition: border-color .2s, box-shadow .2s;
    }
    .admin-slot.current-step {
      border-color: var(--gold);
      box-shadow: 0 0 10px var(--gold-glow);
    }

    .slot-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .slot-label { font-size: .65rem; color: var(--dimmed); text-transform: uppercase; letter-spacing: .8px; min-width: 46px; font-weight: 700; flex-shrink: 0; }
    .slot-info img { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .champ-name { font-size: .88rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .empty-label { font-size: .78rem; color: var(--dimmed); font-style: italic; }

    .btn-edit {
      background: rgba(200,155,60,.08); color: var(--gold-bright);
      border: 1px solid rgba(200,155,60,.2); border-radius: 6px;
      padding: 5px 12px; font-size: .72rem; font-weight: 700;
      cursor: pointer; flex-shrink: 0; transition: background .15s;
    }
    .btn-edit:hover { background: rgba(200,155,60,.2); }

    /* ── Modal ── */
    #modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
    }
    #modal.hidden { display: none; }

    .modal-box {
      background: linear-gradient(160deg, #0d1117 0%, #111827 100%);
      border: 1px solid var(--gold); border-radius: 14px; padding: 24px 26px;
      width: min(720px, 96vw); max-height: 88vh;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 0 60px rgba(200,155,60,.18), 0 24px 60px rgba(0,0,0,.6);
    }
    .modal-box h3 { font-size: 1rem; color: var(--gold-bright); text-shadow: 0 0 14px var(--gold-glow); }
    .modal-box h3 span { font-size: .75rem; color: var(--dimmed); font-weight: 400; }

    #modal-search {
      width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border2);
      border-radius: 20px; padding: 8px 16px; color: var(--text); font-size: .9rem; outline: none;
      transition: border-color .2s, box-shadow .2s; flex-shrink: 0;
    }
    #modal-search:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(200,155,60,.12); }
    #modal-search::placeholder { color: var(--dimmed); }

    #modal-grid {
      flex: 1; overflow-y: auto; min-height: 0;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
      gap: 6px; padding: 2px;
    }
    .modal-champ {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; border: 2px solid transparent; border-radius: 7px; padding: 4px;
      transition: border-color .12s, transform .1s, background .1s;
    }
    .modal-champ:hover { border-color: var(--gold); transform: scale(1.08); background: rgba(200,155,60,.06); }
    .modal-champ img { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; display: block; }
    .modal-champ span { font-size: .48rem; color: var(--text); text-align: center; text-transform: uppercase; letter-spacing: .3px; line-height: 1.2; font-weight: 600; }
    .modal-champ.used { opacity: .2; cursor: not-allowed; pointer-events: none; }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }
    .btn-danger { background: rgba(232,64,87,.1); color: var(--red); border: 1px solid rgba(232,64,87,.28); border-radius: 8px; padding: 8px 18px; font-size: .8rem; font-weight: 700; cursor: pointer; transition: background .15s; }
    .btn-danger:hover { background: rgba(232,64,87,.22); }
    .btn-cancel { background: rgba(255,255,255,.04); color: var(--dimmed); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 18px; font-size: .8rem; font-weight: 700; cursor: pointer; transition: background .15s; }
    .btn-cancel:hover { background: rgba(255,255,255,.09); color: var(--text); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: var(--panel2); border: 1px solid var(--border2); border-radius: 10px;
      padding: 10px 22px; font-size: .85rem; font-weight: 700;
      box-shadow: 0 8px 28px rgba(0,0,0,.4); z-index: 200;
      transition: transform .25s, opacity .25s; opacity: 0;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.ok  { border-color: rgba(26,156,255,.4); color: var(--blue); }
    #toast.err { border-color: rgba(232,64,87,.4);  color: var(--red); }

    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <h1>⚙️ Admin — <span id="draft-title">Chargement…</span></h1>
    <div class="step-controls">
      <button class="btn btn-prev" id="btn-prev-step">← Étape préc.</button>
      <div id="step-info">Chargement…</div>
      <button class="btn btn-next" id="btn-next-step">Étape suiv. →</button>
      <button class="btn btn-refresh" id="btn-refresh">↻ Rafraîchir</button>
    </div>
  </header>

  <div class="teams-grid">
    <div class="team-col blue">
      <h2 id="blue-name">Blue Team</h2>
      <div class="slots-section">
        <h3>Bans</h3>
        <div id="blue-bans-list"></div>
      </div>
      <div class="slots-section">
        <h3>Picks</h3>
        <div id="blue-picks-list"></div>
      </div>
    </div>
    <div class="team-col red">
      <h2 id="red-name">Red Team</h2>
      <div class="slots-section">
        <h3>Bans</h3>
        <div id="red-bans-list"></div>
      </div>
      <div class="slots-section">
        <h3>Picks</h3>
        <div id="red-picks-list"></div>
      </div>
    </div>
  </div>

  <!-- Champion picker modal -->
  <div id="modal" class="hidden">
    <div class="modal-box">
      <h3>Choisir un champion <span id="modal-slot-label"></span></h3>
      <input type="text" id="modal-search" placeholder="🔍  Rechercher un champion…" autocomplete="off" />
      <div id="modal-grid"></div>
      <div class="modal-actions">
        <button class="btn-danger" id="btn-clear-slot">🗑️ Vider ce slot</button>
        <button class="btn-cancel" id="btn-cancel-modal">Annuler</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/admin.js"></script>
</body>
</html>
